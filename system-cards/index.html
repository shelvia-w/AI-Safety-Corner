<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%232dd4bf'>⌘</text></svg>" />
  <title>System Cards</title>
  <meta name="description" content="Synthesized summaries of AI model system cards — capabilities, safety considerations, evaluations, and transparency notes. A curated reference for AI safety discussion." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css?v=366f96b8dd" />
  <link rel="stylesheet" href="cards.css?v=941c5683b0" />
</head>
<body>

  <!-- ============================================================
       AMBIENT CANVAS
  ============================================================ -->
  <canvas id="starfield" aria-hidden="true"></canvas>

  <!-- ============================================================
       TOP NAV (injected by nav.js)
  ============================================================ -->
  <div id="site-nav"></div>
  <script src="../nav.js?v=74bfacc0e2"></script>

  <!-- ============================================================
       SYSTEM CARDS PAGE
  ============================================================ -->
  <div class="sc-page">

    <!-- ── Page hero ─────────────────────────────────────────── -->
    <header class="sc-hero">
      <div class="sc-hero-inner">

        <div class="sc-eyebrow">
          <span class="sc-eyebrow-glyph" aria-hidden="true">⌘</span>
          <span class="sc-eyebrow-zone">VI</span>
          <span class="sc-eyebrow-sep">·</span>
          <span class="sc-eyebrow-label">Model Library</span>
        </div>

        <h1 class="sc-hero-title">
          System <em>Cards</em>
        </h1>

        <p class="sc-hero-subtitle">
          Review system cards for popular state-of-the-art AI models.<br />
          Made compact for easy reference.
        </p>

        <div class="sc-stats">
          <span class="sc-stat">
            <span class="sc-stat-dot" aria-hidden="true"></span>
            <span id="totalCount">— models</span>
          </span>
        </div>

      </div>
    </header>

    <!-- ── Sticky controls: search + access filter ───────────── -->
    <div class="sc-controls" role="search" aria-label="Filter system cards">
      <div class="sc-controls-inner">

        <div class="sc-search-wrap">
          <span class="sc-search-icon" aria-hidden="true">⌕</span>
          <input
            type="search"
            id="scSearch"
            class="sc-search"
            placeholder="Search models…"
            autocomplete="off"
            spellcheck="false"
            aria-label="Search system cards"
          />
        </div>

        <div class="sc-filter-group" role="group" aria-label="Filter by access status">
          <button class="sc-pill sc-pill--closed" data-access="closed" aria-pressed="false">Closed</button>
          <button class="sc-pill sc-pill--open" data-access="open-weight" aria-pressed="false">Open-weight</button>
          <button class="sc-pill sc-pill--archived" data-access="archived" aria-pressed="false">Archived</button>
        </div>

      </div>
    </div>

    <!-- ── Organization filter row ───────────────────────────── -->
    <div class="sc-filter-row" role="navigation" aria-label="Filter by organization">
      <div class="sc-filter-row-inner">
        <span class="sc-filter-row-label">Orgs</span>
        <div id="orgFilters" class="sc-filter-group" role="group" aria-label="Filter by organization"></div>
      </div>
    </div>

    <!-- ── Results count + clear ─────────────────────────────── -->
    <div class="sc-results-line">
      <span id="resultsCount" class="sc-results-count" aria-live="polite" aria-atomic="true"></span>
      <button id="scClearBtn" class="sc-clear-btn" aria-label="Clear all filters">
        Clear filters ✕
      </button>
    </div>

    <!-- ── Grid ──────────────────────────────────────────────── -->
    <div class="sc-body">
      <div class="sc-body-inner">

        <div id="scGrid" class="sc-grid" role="list" aria-label="System cards"></div>

        <!-- Empty state -->
        <div id="scEmpty" class="sc-empty" role="status" aria-live="polite">
          <div class="sc-empty-glyph" aria-hidden="true">⌘</div>
          <h2 class="sc-empty-title">No models found</h2>
          <p class="sc-empty-body">
            Try a different search term, or clear the filters to browse everything.
          </p>
          <button id="emptyResetBtn" class="sc-empty-reset">
            Clear &amp; browse all
          </button>
        </div>

      </div>
    </div>

  </div><!-- /.sc-page -->

  <!-- ============================================================
       FOOTER
  ============================================================ -->
  <footer class="site-footer">
    <div class="footer-bottom">
      <span class="copyright-line">
        <span class="copyright-mark">©</span>
        <span>2026 AI Safety Corner</span>
      </span>
    </div>
  </footer>

  <!-- About drawer injected by nav.js -->

  <!-- ============================================================
       SCRIPTS
  ============================================================ -->
  <script src="../main.js?v=3ce3eb6960"></script>
  <script src="cards-data.js?v=03c5517218"></script>
  <script src="cards-index.js?v=259a07b703"></script>
</body>
</html>
